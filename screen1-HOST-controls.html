<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMP WOF — Host Controls</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold2: #c8960c;
    --bg: #05080f;
    --panel: #0b1220;
    --border: #1a2e50;
    --cyan: #00e5ff;
    --red: #ff3b3b;
    --green: #00e676;
    --blue1: #4488ff;
    --blue2: #ff5577;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Barlow Condensed', sans-serif;
    background: var(--bg);
    color: #e8f0ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(0,80,180,0.1) 0%, transparent 60%);
  }

  .header {
    background: rgba(0,0,0,0.6);
    border-bottom: 2px solid var(--gold2);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: 28px;
    letter-spacing: 5px;
    color: var(--gold);
  }
  .screen-badge {
    background: rgba(255,100,0,0.15);
    border: 1px solid #ff6600;
    color: #ff9944;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 5px 12px;
    border-radius: 4px;
  }

  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 14px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .panel-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 17px;
    letter-spacing: 3px;
    color: var(--gold2);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 2px;
  }

  /* Puzzle list */
  .puzzle-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    flex: 1;
  }
  .puzzle-list::-webkit-scrollbar { width: 4px; }
  .puzzle-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .puzzle-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.3;
  }
  .puzzle-item:hover { background: rgba(0,200,255,0.08); border-color: var(--cyan); }
  .puzzle-item.active { background: rgba(255,215,0,0.08); border-color: var(--gold); }
  .puzzle-item .cat {
    font-size: 10px; letter-spacing: 2px;
    color: #556688; text-transform: uppercase; margin-bottom: 2px;
  }
  .puzzle-item .phrase {
    font-size: 14px; color: var(--gold); font-weight: 600;
  }
  .puzzle-item .hint-preview {
    font-size: 12px; color: #445566; margin-top: 2px;
  }
  .puzzle-item.active .cat { color: var(--gold2); }

  /* Inputs */
  label {
    font-size: 11px; letter-spacing: 3px;
    color: #445566; text-transform: uppercase; margin-bottom: 2px;
    display: block;
  }

  .input-group { display: flex; flex-direction: column; gap: 3px; }

  input[type="text"] {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    padding: 9px 12px;
    outline: none;
    width: 100%;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--cyan); }
  #letterInput { font-family: 'Bebas Neue', cursive; font-size: 28px; text-align: center; }

  .btn {
    border: none;
    border-radius: 7px;
    padding: 11px 16px;
    font-family: 'Bebas Neue', cursive;
    font-size: 17px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    text-align: center;
  }
  .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); filter: brightness(0.9); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; filter: none; }

  .btn-gold   { background: linear-gradient(135deg, var(--gold), #c8960c); color: #000; }
  .btn-cyan   { background: linear-gradient(135deg, var(--cyan), #0099bb); color: #000; }
  .btn-green  { background: linear-gradient(135deg, var(--green), #00994d); color: #000; }
  .btn-red    { background: linear-gradient(135deg, var(--red), #880011); color: #fff; }
  .btn-purple { background: linear-gradient(135deg, #8855ff, #4422bb); color: #fff; }
  .btn-dim    { background: rgba(255,255,255,0.07); color: #aabbcc; border: 1px solid var(--border); }

  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }

  /* Status */
  .status-box {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--cyan);
    line-height: 1.4;
    min-height: 44px;
  }

  /* Used letters */
  .used-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .ul-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid #1e3050;
    border-radius: 4px;
    padding: 3px 8px;
    font-family: 'Bebas Neue', cursive;
    font-size: 14px;
    color: #445566;
    text-decoration: line-through;
  }

  /* Score summary in host */
  .score-summary {
    display: flex;
    gap: 10px;
  }
  .ss-team {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px;
    text-align: center;
  }
  .ss-team.active { border-color: var(--gold); background: rgba(255,215,0,0.05); }
  .ss-name { font-family: 'Bebas Neue', cursive; font-size: 16px; letter-spacing: 3px; }
  .t1n { color: var(--blue1); }
  .t2n { color: var(--blue2); }
  .ss-total { font-family: 'Bebas Neue', cursive; font-size: 28px; color: var(--gold); }
  .ss-round { font-size: 12px; color: #445566; }
  .ss-round span { color: var(--green); }
  .ss-turn {
    font-family: 'Bebas Neue', cursive;
    font-size: 11px; letter-spacing: 2px;
    color: #000; background: var(--gold);
    border-radius: 3px; padding: 2px 6px; margin-top: 4px;
    display: none;
  }
  .ss-team.active .ss-turn { display: inline-block; }

  .divider {
    height: 1px; background: var(--border); margin: 2px 0;
  }
  .fullscreen-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    color: #aabbcc;
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'Bebas Neue', cursive;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .fullscreen-btn:hover { background: rgba(255,255,255,0.14); color: #fff; border-color: var(--cyan); }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ EMP WOF — Host Controls</h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    <div class="screen-badge">SCREEN 1 — HOST ONLY</div>
  </div>
</div>

<div class="main">

  <!-- LEFT: Puzzle Selector -->
  <div class="panel">
    <div class="panel-title">📋 Puzzle Select</div>
    <div class="puzzle-list" id="puzzleList"></div>
  </div>

  <!-- RIGHT: Game Controls -->
  <div class="panel">
    <div class="panel-title">🎮 Game Controls</div>

    <!-- Status -->
    <div class="input-group">
      <label>Game Status</label>
      <div class="status-box" id="statusBox">Select a puzzle to begin.</div>
    </div>

    <!-- Scores -->
    <div class="input-group">
      <label>Scoreboard</label>
      <div class="score-summary">
        <div class="ss-team active" id="ss1">
          <div class="ss-name t1n">Team 1</div>
          <div class="ss-total" id="ss1total">$0</div>
          <div class="ss-round">Round: <span id="ss1round">$0</span></div>
          <div class="ss-turn">ACTIVE</div>
        </div>
        <div class="ss-team" id="ss2">
          <div class="ss-name t2n">Team 2</div>
          <div class="ss-total" id="ss2total">$0</div>
          <div class="ss-round">Round: <span id="ss2round">$0</span></div>
          <div class="ss-turn">ACTIVE</div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-dim" onclick="bankRound(1)">Bank T1</button>
      <button class="btn btn-dim" onclick="bankRound(2)">Bank T2</button>
    </div>

    <div class="divider"></div>

    <!-- SPIN -->
    <button class="btn btn-gold" id="btnSpin" onclick="triggerSpin()">🎡 SPIN THE WHEEL</button>

    <div class="divider"></div>

    <!-- Letter Guess -->
    <div class="input-group">
      <label>Guess a Letter</label>
      <input type="text" id="letterInput" maxlength="1" placeholder="A" />
    </div>
    <button class="btn btn-cyan" id="btnGuess" onclick="guessLetter()" disabled>✦ Guess Letter</button>

    <div class="divider"></div>

    <!-- Solve -->
    <div class="input-group">
      <label>Solve the Puzzle</label>
      <input type="text" id="solveInput" placeholder="Type full solution…" />
    </div>
    <button class="btn btn-green" id="btnSolve" onclick="trySolve()" disabled>✓ Submit Solution</button>

    <div class="divider"></div>

    <!-- Turn / Round -->
    <div class="btn-row">
      <button class="btn btn-purple" onclick="switchTeam()">⇄ Pass Turn</button>
      <button class="btn btn-dim" onclick="nextRound()">⏭ Next Round</button>
    </div>
    <button class="btn btn-red" onclick="resetGame()">↺ Reset Entire Game</button>

    <!-- Used Letters -->
    <div class="input-group">
      <label>Used Letters</label>
      <div class="used-wrap" id="usedLetters"></div>
    </div>

  </div>

</div>

<script>
// ============================================================
// PUZZLES — Edit these for your EMP training content!
// ============================================================
const PUZZLES = [
  { category: "EMP COMMUNICATION",  phrase: "CONTACT FIRST IMPRESSIONS TEAM",                                                  hint: "If there is an emergency..." },
  { category: "EMP ROLES",          phrase: "FIRST IMPRESSIONS FOR PASTOR GREEN",                                               hint: "A staff member contacts..." },
  { category: "EMP ROLES",          phrase: "MEDICAL EMERGENCIES DISTURBANCES SUSPICIOUS ACTIVITY AND THREATS",                 hint: "Security team responds to..." },
  { category: "EMP PROTOCOL",       phrase: "AED FIRST AID KIT FIRE EXTINGUISHER AND BLEED KIT",                               hint: "4 Types of safety equipment found at all Life.Church Locations..." },
  { category: "EMP PROTOCOL",       phrase: "COMPLETE AN INCIDENT REPORT",                                                      hint: "After a medical emergency, it is always true to..." },
  { category: "EMP COMMUNICATION",  phrase: "CENTRAL SECURITY DURING AN EMERGENCY",                                             hint: "Texting is used by..." },
  { category: "EMP PROTOCOL",       phrase: "THERE IS A FIRE OR SUSPICIOUS ITEM",                                               hint: "Evactuate the building when..." },
];

// ============================================================
// STATE
// ============================================================
let G = {
  puzzleIdx: 0,
  phrase: '',
  revealed: new Set(),
  used: new Set(),
  team: 1,
  t1total: 0, t2total: 0,
  t1round: 0, t2round: 0,
  spinValue: 0,
  canGuess: false,
  round: 1,
};

let lastPollTs = 0;

function broadcast(extraFields = {}) {
  const payload = {
    phrase: G.phrase,
    category: PUZZLES[G.puzzleIdx]?.category || '',
    hint: PUZZLES[G.puzzleIdx]?.hint || '',
    revealed: [...G.revealed],
    used: [...G.used],
    team: G.team,
    t1total: G.t1total, t2total: G.t2total,
    t1round: G.t1round, t2round: G.t2round,
    spinValue: G.spinValue,
    canGuess: G.canGuess,
    round: G.round,
    status: document.getElementById('statusBox').textContent,
    ...extraFields,
    ts: Date.now(),
  };
  localStorage.setItem('empWOF', JSON.stringify(payload));
}

// ============================================================
// GAME LOGIC
// ============================================================
function triggerSpin() {
  document.getElementById('btnSpin').disabled = true;
  localStorage.setItem('empWOF_trigger', JSON.stringify({ spin: true, ts: Date.now() }));
  // Re-enable after wheel finishes (wheel will re-enable via empWOF update)
  setTimeout(() => { document.getElementById('btnSpin').disabled = false; }, 6000);
}

function loadPuzzle(idx) {
  G.puzzleIdx = idx;
  G.phrase = PUZZLES[idx].phrase.toUpperCase();
  G.revealed = new Set();
  G.used = new Set();
  G.canGuess = false;
  G.spinValue = 0;
  document.getElementById('btnGuess').disabled = true;
  document.getElementById('btnSolve').disabled = true;
  document.getElementById('solveInput').value = '';
  document.getElementById('letterInput').value = '';
  renderUsed();
  updateUI();
  setStatusAndBroadcast(`Puzzle loaded! Team ${G.team} — waiting for spin on the Wheel screen.`);
  document.querySelectorAll('.puzzle-item').forEach((el,i) => el.classList.toggle('active', i===idx));
}

function guessLetter() {
  if (!G.canGuess) return;
  const inp = document.getElementById('letterInput');
  const letter = inp.value.toUpperCase().trim();
  inp.value = ''; inp.focus();
  if (!letter || !/[A-Z]/.test(letter)) { setStatus('Enter a valid letter A–Z.'); return; }
  if (G.used.has(letter)) { setStatus(`"${letter}" was already guessed!`); return; }
  G.used.add(letter);

  const count = [...G.phrase].filter(c => c === letter).length;
  if (count > 0) {
    G.revealed.add(letter);
    const earn = count * G.spinValue;
    G[`t${G.team}round`] += earn;
    renderUsed(); updateUI();
    setStatusAndBroadcast(`✅ "${letter}" appears ${count}x — Team ${G.team} earns $${earn.toLocaleString()}!`);
    G.canGuess = false;
    document.getElementById('btnGuess').disabled = true;
    document.getElementById('btnSolve').disabled = false;
    if (isSolved()) { revealAll(); updateUI(); showSolved(`Team ${G.team} revealed the whole puzzle!`); }
    else broadcast();
  } else {
    renderUsed();
    setStatusAndBroadcast(`❌ No "${letter}" in the puzzle — turn passes to Team ${G.team===1?2:1}!`);
    G.canGuess = false;
    document.getElementById('btnGuess').disabled = true;
    document.getElementById('btnSolve').disabled = true;
    broadcast();
    setTimeout(() => switchTeam(), 1400);
  }
}

function trySolve() {
  const inp = document.getElementById('solveInput');
  const attempt = inp.value.toUpperCase().trim();
  inp.value = '';
  if (!attempt) { setStatus('Type your solution first!'); return; }
  const norm = s => s.replace(/\s+/g,' ').trim();
  if (norm(attempt) === norm(G.phrase)) {
    revealAll(); updateUI();
    G[`t${G.team}round`] += 1000;
    updateUI();
    showSolved(`Team ${G.team} solved it! +$1,000 bonus!`);
  } else {
    setStatusAndBroadcast(`❌ Wrong! "…${attempt.substring(0,20)}…" — Turn passes.`);
    G.canGuess = false;
    document.getElementById('btnGuess').disabled = true;
    document.getElementById('btnSolve').disabled = true;
    broadcast();
    setTimeout(() => switchTeam(), 1400);
  }
}

function showSolved(msg) {
  setStatus(`🎉 SOLVED! ${msg}`);
  document.getElementById('btnGuess').disabled = true;
  document.getElementById('btnSolve').disabled = true;
  broadcast({ solved: true });
}

function isSolved() {
  return [...G.phrase].every(c => c===' ' || G.revealed.has(c));
}
function revealAll() {
  [...G.phrase].forEach(c => { if(c!==' ') G.revealed.add(c); });
}

function switchTeam() {
  G.team = G.team===1 ? 2 : 1;
  G.canGuess = false;
  document.getElementById('btnGuess').disabled = true;
  document.getElementById('btnSolve').disabled = true;
  updateUI();
  setStatusAndBroadcast(`Team ${G.team}'s turn — spin the wheel!`);
  broadcast();
}

function bankRound(t) {
  G[`t${t}total`] += G[`t${t}round`];
  G[`t${t}round`] = 0;
  updateUI();
  broadcast();
}

function nextRound() {
  G.round++;
  const next = (G.puzzleIdx + 1) % PUZZLES.length;
  loadPuzzle(next);
}

function resetGame() {
  if (!confirm('Reset the entire game? All scores will be cleared.')) return;
  G.t1total=0; G.t2total=0; G.t1round=0; G.t2round=0;
  G.team=1; G.round=1;
  G.spinValue=0; G.canGuess=false;
  // Clear all localStorage state so other screens reset cleanly
  localStorage.removeItem('empWOF');
  localStorage.removeItem('empWOF_trigger');
  lastPollTs = 0;
  document.getElementById('btnGuess').disabled = true;
  document.getElementById('btnSolve').disabled = true;
  updateUI();
  loadPuzzle(0);
}

// ============================================================
// UI
// ============================================================
function setStatus(msg) {
  document.getElementById('statusBox').textContent = msg;
  // NOTE: do NOT call broadcast() here — setStatus is also called when
  // absorbing incoming wheel state, and broadcasting would overwrite it.
}

function setStatusAndBroadcast(msg) {
  document.getElementById('statusBox').textContent = msg;
  broadcast();
}

function updateUI() {
  document.getElementById('ss1total').textContent = '$'+G.t1total.toLocaleString();
  document.getElementById('ss2total').textContent = '$'+G.t2total.toLocaleString();
  document.getElementById('ss1round').textContent = '$'+G.t1round.toLocaleString();
  document.getElementById('ss2round').textContent = '$'+G.t2round.toLocaleString();
  document.getElementById('ss1').classList.toggle('active', G.team===1);
  document.getElementById('ss2').classList.toggle('active', G.team===2);
}

function renderUsed() {
  const c = document.getElementById('usedLetters');
  c.innerHTML = '';
  [...G.used].sort().forEach(l => {
    const b = document.createElement('span');
    b.className='ul-chip'; b.textContent=l;
    c.appendChild(b);
  });
}

function buildPuzzleList() {
  const list = document.getElementById('puzzleList');
  PUZZLES.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'puzzle-item' + (i===0?' active':'');
    el.innerHTML = `<div class="cat">${p.category}</div><div class="phrase">${p.phrase}</div><div class="hint-preview">💡 ${p.hint}</div>`;
    el.onclick = () => {
      if (!G.phrase || confirm('Load this puzzle? Current progress will reset.')) loadPuzzle(i);
    };
    list.appendChild(el);
  });
}

// ============================================================
// SYNC — Read wheel screen updates via polling
// ============================================================

setInterval(() => {
  try {
    const raw = localStorage.getItem('empWOF');
    if (!raw) return;
    const d = JSON.parse(raw);
    if (!d.ts || d.ts === lastPollTs) return;

    // Only absorb if this write came from the wheel (not from us).
    // We detect that by checking if spinValue or status changed from
    // what we last wrote — simplest: just always absorb spinValue/canGuess/team
    // since the host never writes those independently mid-round.
    lastPollTs = d.ts;

    let changed = false;

    if (typeof d.spinValue !== 'undefined' && d.spinValue !== G.spinValue) {
      G.spinValue = d.spinValue; changed = true;
    }
    if (typeof d.canGuess !== 'undefined' && d.canGuess !== G.canGuess) {
      G.canGuess = d.canGuess;
      document.getElementById('btnGuess').disabled = !G.canGuess;
      document.getElementById('btnSolve').disabled = !G.canGuess;
      changed = true;
    }
    if (typeof d.team !== 'undefined' && d.team !== G.team) {
      G.team = d.team; changed = true;
    }
    if (typeof d.t1round !== 'undefined' && d.t1round !== G.t1round) {
      G.t1round = d.t1round; changed = true;
    }
    if (typeof d.t2round !== 'undefined' && d.t2round !== G.t2round) {
      G.t2round = d.t2round; changed = true;
    }
    if (typeof d.t1total !== 'undefined' && d.t1total !== G.t1total) {
      G.t1total = d.t1total; changed = true;
    }
    if (typeof d.t2total !== 'undefined' && d.t2total !== G.t2total) {
      G.t2total = d.t2total; changed = true;
    }
    if (d.status && d.status !== document.getElementById('statusBox').textContent) {
      document.getElementById('statusBox').textContent = d.status; changed = true;
    }

    if (changed) updateUI();
  } catch(err) { console.error('host poll error:', err); }
}, 150);

// Keyboard shortcuts
document.getElementById('letterInput').addEventListener('keydown', e => { if(e.key==='Enter') guessLetter(); });
document.getElementById('solveInput').addEventListener('keydown', e => { if(e.key==='Enter') trySolve(); });

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}
document.addEventListener('fullscreenchange', () => {
  const btn = document.querySelector('.fullscreen-btn');
  if (btn) btn.textContent = document.fullscreenElement ? '✕ Exit Fullscreen' : '⛶ Fullscreen';
});

buildPuzzleList();
loadPuzzle(0);
updateUI();
</script>
</body>
</html>
