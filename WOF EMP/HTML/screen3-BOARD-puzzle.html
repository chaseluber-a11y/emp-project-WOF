<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMP WOF — Puzzle Board</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
  :root{--gold:#FFD700;--gold2:#c8960c;--bg:#05080f;--panel:#0b1220;--border:#1a2e50;--cyan:#00e5ff;--green:#00e676;--blue1:#4488ff;--blue2:#ff5577}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Barlow Condensed',sans-serif;background:#001235;color:#e8f0ff;display:flex;flex-direction:column;height:100vh;background-image:radial-gradient(ellipse at 50% 20%,rgba(10,60,180,0.35) 0%,transparent 60%),radial-gradient(ellipse at 50% 100%,rgba(0,20,80,0.8) 0%,transparent 50%)}
  .header{text-align:center;padding:12px 20px 6px;border-bottom:3px solid var(--gold2);flex-shrink:0;background:linear-gradient(180deg,#000c2a 0%,#001845 100%);position:relative}
  .eyebrow{font-size:11px;letter-spacing:7px;color:var(--gold2);text-transform:uppercase;margin-bottom:2px}
  .header h1{font-family:'Bebas Neue',cursive;font-size:clamp(40px,5.5vw,76px);letter-spacing:12px;color:var(--gold);text-shadow:0 0 60px rgba(255,215,0,0.8),0 0 20px rgba(255,215,0,0.5),0 3px 0 #7a5000;line-height:1}
  .screen-badge{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:rgba(0,230,118,0.1);border:1px solid var(--green);color:var(--green);font-size:11px;letter-spacing:3px;padding:4px 10px;border-radius:4px}
  .fullscreen-btn{position:absolute;left:16px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.07);border:1px solid var(--border);color:#aabbcc;border-radius:6px;padding:6px 12px;font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:2px;cursor:pointer;transition:all 0.15s}
  .fullscreen-btn:hover{background:rgba(255,255,255,0.14);color:#fff;border-color:var(--cyan)}
  .category-strip{flex-shrink:0;text-align:center;padding:10px;background:linear-gradient(90deg,#0a0060,#1a00a0,#0a0060);border-bottom:2px solid var(--gold2);border-top:1px solid rgba(255,215,0,0.2);font-family:'Bebas Neue',cursive;font-size:clamp(16px,2.2vw,26px);letter-spacing:8px;color:#fff;text-shadow:0 0 15px rgba(255,255,255,0.5)}
  .board-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 16px;overflow:hidden;background:radial-gradient(ellipse at 50% 50%,rgba(10,50,160,0.2) 0%,transparent 70%)}
  .board{display:flex;flex-direction:column;align-items:center;gap:clamp(6px,1.2vh,14px);width:100%;max-width:1200px}
  .board-row{display:flex;justify-content:center;gap:clamp(4px,0.7vw,10px);flex-wrap:nowrap}
  .tile{width:var(--tile-size,clamp(40px,5.5vw,80px));height:calc(var(--tile-size,clamp(40px,5.5vw,80px))*1.3);background:linear-gradient(180deg,#061840 0%,#03102e 100%);border:2px solid #0a2860;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:calc(var(--tile-size,clamp(40px,5.5vw,80px))*0.68);color:#334488;text-transform:uppercase;flex-shrink:0;position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,0.05),inset 0 -2px 6px rgba(0,0,0,0.6),0 1px 3px rgba(0,0,0,0.5)}
  .tile.space{background:transparent;border:none;box-shadow:none;width:calc(var(--tile-size,clamp(40px,5.5vw,80px))*0.4)}
  .tile.hidden-letter::after{content:'';position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:55%;height:2px;background:#0a2060;border-radius:1px}
  .tile.revealed{background:linear-gradient(160deg,#e8f4ff 0%,#c8e0ff 50%,#a0c8ff 100%);border-color:#88bbff;border-width:2px;color:#001040;box-shadow:0 0 20px rgba(150,200,255,0.5),0 0 8px rgba(100,180,255,0.4),inset 0 1px 0 rgba(255,255,255,0.9),inset 0 -2px 4px rgba(0,50,150,0.2);animation:tileIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both}
  .tile.newly-revealed{animation:tileIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both,glow 0.8s ease 0.5s both}
  @keyframes tileIn{0%{transform:scaleY(0.1) scaleX(0.8);opacity:0}60%{transform:scaleY(1.06) scaleX(1.01)}100%{transform:scale(1);opacity:1}}
  @keyframes glow{0%{box-shadow:0 0 20px rgba(150,200,255,0.5),0 0 0 0 rgba(180,220,255,0.8)}100%{box-shadow:0 0 20px rgba(150,200,255,0.5),0 0 0 32px rgba(180,220,255,0)}}
  .hint-bar{flex-shrink:0;background:linear-gradient(180deg,#000c2a 0%,#000818 100%);border-top:3px solid var(--gold2);padding:14px 40px;position:relative}
  .hint-bar::before{content:'💡 PROMPT';display:block;font-size:10px;letter-spacing:6px;color:var(--gold2);text-transform:uppercase;margin-bottom:5px}
  .hint-text{font-family:'Bebas Neue',cursive;font-size:clamp(20px,2.8vw,36px);letter-spacing:2px;color:#c8d8f0;line-height:1.2}
  .status-ticker{margin-top:6px;font-size:14px;letter-spacing:2px;color:var(--cyan);opacity:0.8}
  .waiting-overlay{position:fixed;inset:0;z-index:100;background:linear-gradient(180deg,#000c2a 0%,#001845 60%,#000c2a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  .waiting-overlay.hidden{display:none}
  .wt-icon{font-size:80px;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .wt-title{font-family:'Bebas Neue',cursive;font-size:54px;letter-spacing:8px;color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,0.35)}
  .wt-sub{font-size:14px;letter-spacing:5px;color:#1e3050;animation:blink 1.8s ease infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
  .wt-brand{font-size:13px;letter-spacing:4px;color:#1a2e46}
  .solved-flash{display:none;position:fixed;inset:0;z-index:90;background:rgba(0,8,40,0.92);align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;backdrop-filter:blur(8px)}
  .solved-flash.show{display:flex}
  .sf-title{font-family:'Bebas Neue',cursive;font-size:clamp(56px,8vw,100px);letter-spacing:8px;color:var(--gold);text-shadow:0 0 40px rgba(255,215,0,0.6);animation:pop 0.5s cubic-bezier(0.34,1.56,0.64,1)}
  @keyframes pop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
  .sf-phrase{font-family:'Bebas Neue',cursive;font-size:clamp(22px,3vw,40px);letter-spacing:4px;color:#fff;padding:14px 28px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px}

  /* VIDEO OVERLAY */
  .video-overlay{position:fixed;inset:0;z-index:200;background:#000;display:none;align-items:center;justify-content:center}
  .video-overlay.show{display:flex}
  .video-overlay video{width:100%;height:100%;object-fit:contain}
</style>
</head>
<body>
<!-- VIDEO INTRO (board plays with audio) -->
<div class="video-overlay" id="videoOverlay">
  <video id="introVideo" playsinline>
    <source src="../video/intro.mp4" type="video/mp4">
  </video>
</div>
<div class="waiting-overlay" id="waiting">
  <div class="wt-icon">⚡</div>
  <div class="wt-title">WHEEL OF FORTUNE</div>
  <div class="wt-brand">Life.Church — EMP Training</div>
  <div class="wt-sub" id="waitSub">👆 Tap screen to activate audio</div>
</div>
<div class="solved-flash" id="solvedFlash">
  <div class="sf-title">🎉 SOLVED!</div>
  <div class="sf-phrase" id="sfPhrase"></div>
</div>
<div class="header">
  <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
  <div class="eyebrow">⚡ Life.Church EMP Training ⚡</div>
  <h1>WHEEL OF FORTUNE</h1>
  <div class="screen-badge">SCREEN 3 — BOARD</div>
</div>
<div class="category-strip" id="categoryStrip">CATEGORY: —</div>
<div class="board-wrap"><div class="board" id="board"></div></div>
<div class="hint-bar">
  <div class="hint-text" id="hintText">Waiting for puzzle…</div>
  <div class="status-ticker" id="statusTicker">Open the Host screen to begin.</div>
</div>
<script>
// ============================================================
// ⚠️  PASTE YOUR ABLY ROOT API KEY BETWEEN THE QUOTES BELOW
// ============================================================
const ABLY_KEY = 'leOFKA.nbOkGA:CknTFn0f2ehAmi88tbNF0Hj5wY_ld-XuxHnOjbKkYTg';

let prevRevealed = new Set(), prevPhrase = '';
let gameStarted = false;
let lastState = null;

// Build the board structure — tiles start hidden, revealed ones shown immediately
// For staggered reveals, we mark newly revealed tiles with data-new and animate them in sequence
function buildBoard(phrase, revealed, newLetters) {
  const board = document.getElementById('board');
  board.innerHTML = '';
  if (!phrase) return;
  const words = phrase.split(' ');
  const totalLetters = words.reduce((s,w) => s+w.length, 0);
  const maxPerRow = totalLetters>30?18:totalLetters>20?15:13;
  const rows=[], cur=[];
  let curLen=0;
  words.forEach(w => {
    if (curLen+w.length>maxPerRow && cur.length>0) {
      rows.push([...cur]); cur.length=0; cur.push(w); curLen=w.length;
    } else { cur.push(w); curLen+=w.length+1; }
  });
  if (cur.length) rows.push(cur);
  const widestRow = rows.reduce((max,rw) => {
    return Math.max(max, rw.reduce((s,w)=>s+w.length,0)+(rw.length-1));
  }, 0);
  const availableWidth = Math.min(window.innerWidth-40,1200);
  const gapPx = Math.max(4,Math.min(10,availableWidth*0.007));
  const tileW = Math.floor((availableWidth-gapPx*(widestRow-1))/widestRow);
  document.documentElement.style.setProperty('--tile-size', Math.max(20,Math.min(80,tileW))+'px');

  // Track position of each tile in the phrase for staggered reveal ordering
  let phrasePos = 0;
  const newTilesByPosition = []; // [{pos, tileEl}, ...] in phrase order

  rows.forEach(rowWords => {
    const row=document.createElement('div'); row.className='board-row';
    rowWords.forEach((word,wi) => {
      [...word].forEach(ch => {
        const tile=document.createElement('div');
        const isRev = revealed.has(ch);
        const isNew = newLetters && newLetters.has(ch);
        if (isNew) {
          // Start hidden — will be revealed with stagger
          tile.className='tile hidden-letter';
          tile.textContent='';
          tile.dataset.letter = ch;
          tile.dataset.pos = phrasePos;
          newTilesByPosition.push({pos: phrasePos, el: tile});
        } else {
          tile.className='tile'+(isRev?' revealed':' hidden-letter');
          tile.textContent=isRev?ch:'';
        }
        row.appendChild(tile);
        phrasePos++;
      });
      if (wi<rowWords.length-1) {
        const sp=document.createElement('div'); sp.className='tile space'; row.appendChild(sp);
        phrasePos++; // count space as a position
      }
    });
    board.appendChild(row);
  });

  // Stagger the new tile reveals — left to right, 400ms apart, ding each one
  if (newTilesByPosition.length > 0) {
    newTilesByPosition.sort((a,b) => a.pos - b.pos);
    newTilesByPosition.forEach((item, i) => {
      setTimeout(() => {
        item.el.className = 'tile revealed newly-revealed';
        item.el.textContent = item.el.dataset.letter;
        playBoardSFX('ding');
      }, i * 400);
    });
  }

  return newTilesByPosition.length;
}

let solvedTimer = null;

function applyState(data) {
  // Always cache latest state — applyState only renders if game has started
  lastState = data;
  if (!gameStarted) return;
  document.getElementById('waiting').classList.add('hidden');
  const phrase = (data.phrase||'').toUpperCase();
  const revealed = new Set(data.revealed||[]);

  document.getElementById('categoryStrip').textContent = `CATEGORY: ${data.category||'—'}`;
  document.getElementById('hintText').textContent = data.hint||'—';
  document.getElementById('statusTicker').textContent = data.status||'';

  const isNewPuzzle = phrase && phrase !== prevPhrase;

  if (phrase) {
    if (isNewPuzzle) {
      // New puzzle — build fresh, no stagger, play reveal sound
      buildBoard(phrase, revealed, null);
      playBoardSFX('reveal');
    } else {
      // Same puzzle — figure out which letters are newly revealed and stagger them
      const newLetters = new Set([...revealed].filter(ch => !prevRevealed.has(ch)));
      if (newLetters.size > 0) {
        buildBoard(phrase, revealed, newLetters);
        // NOTE: dings are fired inside buildBoard per tile — don't fire here
      } else {
        buildBoard(phrase, revealed, null);
      }
    }
  }

  if (data.solved) {
    // Wait for all stagger dings to finish before showing solved flash
    const newCount = [...revealed].filter(ch => !prevRevealed.has(ch)).length;
    const delay = isNewPuzzle ? 0 : newCount * 400 + 600;
    const sf = document.getElementById('solvedFlash');
    document.getElementById('sfPhrase').textContent = phrase;
    clearTimeout(solvedTimer);
    solvedTimer = setTimeout(() => {
      sf.classList.add('show');
      setTimeout(() => sf.classList.remove('show'), 5000);
    }, delay);
  } else {
    document.getElementById('solvedFlash').classList.remove('show');
  }

  prevRevealed = revealed;
  prevPhrase = phrase;
}


// ============================================================
// AUDIO — Board plays: ding, wrong, solved + intro video (with audio)
// ============================================================
let isMuted = false;
let sfxVol = 0.9;

const BOARD_SFX = {
  ding:    '../audio/ding.mp3',
  wrong:   '../audio/wrong.mp3',
  solved:  '../audio/solved.mp3',
  reveal:  '../audio/reveal.mp3',
};

function playBoardSFX(name) {
  if (isMuted) return;
  const src = BOARD_SFX[name];
  if (!src) return;
  const a = new Audio(src); a.volume = sfxVol; a.play().catch(()=>{});
}

function handleAudioCue(d) {
  switch (d.cue) {
    case 'sfx':
      // Skip 'ding' — board fires its own staggered dings per tile
      if (d.name !== 'ding') playBoardSFX(d.name);
      break;
    case 'mute':        isMuted = d.muted; break;
    case 'set-sfx-vol': sfxVol = d.vol; break;
  }
}



// Track whether the user has interacted with this page
// (required by browsers before allowing audio/video with sound)
let userInteracted = false;

document.addEventListener('click', () => {
  if (userInteracted) return;
  userInteracted = true;
  document.getElementById('waitSub').textContent = 'Waiting for host to start…';
  // Pre-load and prime the video now that we have a user gesture
  const vid = document.getElementById('introVideo');
  if (!vid) return;
  vid.muted = false;
  vid.preload = 'auto';
  vid.load();
  // Play+pause to register video with browser — unlocks future unmuted playback
  vid.play().then(() => {
    vid.pause();
    vid.currentTime = 0;
  }).catch(() => {});
}, { once: false });

function revealGame() {
  const ov  = document.getElementById('videoOverlay');
  const vid = document.getElementById('introVideo');

  function afterVideo() {
    gameStarted = true;
    ov.classList.remove('show');
    document.getElementById('waiting').classList.add('hidden');
    if (lastState) applyState(lastState);
  }

  ov.classList.add('show');
  vid.currentTime = 0;
  vid.volume = 1;
  vid.muted = !userInteracted; // muted only if user never tapped
  vid.play().then(() => {
    vid.onended = afterVideo;
    // If it started muted because no gesture, unmute now
    // (some browsers allow unmuting after play starts)
    if (vid.muted) {
      setTimeout(() => { vid.muted = false; }, 100);
    }
  }).catch(() => {
    afterVideo(); // video blocked entirely — skip to game
  });
}

function initAbly() {
  const ably = new Ably.Realtime({key:ABLY_KEY});
  const channel = ably.channels.get('emp-wof');
  channel.subscribe('state', (msg) => { applyState(msg.data); });
  channel.subscribe('wheel-update', (msg) => {
    if (msg.data.status) document.getElementById('statusTicker').textContent = msg.data.status;
  });
  // Audio cues from host
  channel.subscribe('audio-cue', (msg) => { handleAudioCue(msg.data); });
  // Intro video trigger from host
  channel.subscribe('intro-start', () => { revealGame(); });
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen().catch(()=>{});
}
document.addEventListener('fullscreenchange', () => {
  const btn=document.querySelector('.fullscreen-btn');
  if (btn) btn.textContent=document.fullscreenElement?'✕ Exit Fullscreen':'⛶ Fullscreen';
});

initAbly();
</script>
</body>
</html>
