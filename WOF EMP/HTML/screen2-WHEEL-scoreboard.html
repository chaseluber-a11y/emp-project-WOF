<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMP WOF — Wheel Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
  :root{--gold:#FFD700;--gold2:#c8960c;--bg:#05080f;--panel:#0b1220;--border:#1a2e50;--cyan:#00e5ff;--green:#00e676;--blue1:#4488ff;--blue2:#ff5577}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Barlow Condensed',sans-serif;background:#001235;color:#e8f0ff;display:flex;flex-direction:column;height:100vh;background-image:radial-gradient(ellipse at 50% 30%,rgba(10,50,180,0.4) 0%,transparent 65%)}
  .header{text-align:center;padding:10px 20px 6px;border-bottom:3px solid var(--gold2);flex-shrink:0;background:linear-gradient(180deg,#000c2a 0%,#001845 100%);position:relative}
  .eyebrow{font-size:11px;letter-spacing:6px;color:var(--gold2);text-transform:uppercase;margin-bottom:2px}
  .header h1{font-family:'Bebas Neue',cursive;font-size:clamp(34px,4.5vw,62px);letter-spacing:8px;color:var(--gold);text-shadow:0 0 60px rgba(255,215,0,0.8),0 0 20px rgba(255,215,0,0.5),0 3px 0 #7a5000;line-height:1}
  .screen-badge{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:rgba(0,100,255,0.15);border:1px solid var(--blue1);color:var(--blue1);font-size:11px;letter-spacing:3px;padding:4px 10px;border-radius:4px}
  .fullscreen-btn{position:absolute;left:16px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.07);border:1px solid var(--border);color:#aabbcc;border-radius:6px;padding:6px 12px;font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:2px;cursor:pointer;transition:all 0.15s}
  .fullscreen-btn:hover{background:rgba(255,255,255,0.14);color:#fff;border-color:var(--cyan)}
  .wheel-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:10px;position:relative;background:radial-gradient(ellipse at 50% 50%,rgba(10,40,120,0.5) 0%,transparent 70%)}
  .wheel-wrapper{position:relative;width:min(55vh,500px);height:min(55vh,500px)}
  .pointer{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:36px solid var(--gold);filter:drop-shadow(0 4px 8px rgba(0,0,0,0.7));z-index:10}
  #wheelCanvas{width:100%;height:100%;border-radius:50%;box-shadow:0 0 0 8px var(--gold2),0 0 0 14px #1e1400,0 0 60px rgba(255,215,0,0.2);display:block}
  .spin-result-wrap{text-align:center}
  .spin-result-label{font-size:11px;letter-spacing:5px;color:#334466;text-transform:uppercase;margin-bottom:4px}
  .spin-result{font-family:'Bebas Neue',cursive;font-size:clamp(36px,4.5vw,60px);letter-spacing:5px;color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,0.8),0 0 10px rgba(255,215,0,0.5);min-height:60px;display:flex;align-items:center;justify-content:center}
  .spin-value-display{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:3px;color:#aaccff;background:rgba(0,10,50,0.7);border:1px solid #1a3a80;padding:5px 18px;border-radius:20px;box-shadow:0 0 12px rgba(100,150,255,0.2)}
  .scoreboard{flex-shrink:0;display:flex;border-top:3px solid var(--gold2);background:linear-gradient(180deg,#000c2a 0%,#000818 100%)}
  .team-block{flex:1;display:flex;align-items:center;gap:14px;padding:14px 28px;position:relative;transition:background 0.3s}
  .team-block.active{background:rgba(255,215,0,0.07)}
  .team-block::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:transparent;transition:0.3s}
  .team-block.active::after{background:var(--gold)}
  .team-stripe{width:6px;height:58px;border-radius:3px;flex-shrink:0}
  .s1{background:linear-gradient(180deg,var(--blue1),#2244cc)}
  .s2{background:linear-gradient(180deg,var(--blue2),#cc2244)}
  .team-data{flex:1}
  .team-name-row{display:flex;align-items:center;gap:10px;margin-bottom:3px}
  .team-name{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:3px}
  .t1n{color:var(--blue1)}.t2n{color:var(--blue2)}
  .turn-pill{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:3px;background:var(--gold);color:#000;padding:3px 9px;border-radius:4px;animation:pulseG 1.2s infinite;display:none}
  .active .turn-pill{display:inline-block}
  @keyframes pulseG{0%,100%{opacity:1}50%{opacity:0.5}}
  .team-total{font-family:'Bebas Neue',cursive;font-size:48px;line-height:1;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,0.6),0 0 8px rgba(255,215,0,0.3)}
  .team-round{font-size:14px;color:#3a5577;letter-spacing:1px}
  .team-round span{color:var(--green)}
  .score-divider{width:1px;background:var(--border);align-self:stretch}
  .bank-btn{background:rgba(0,230,118,0.12);border:1px solid rgba(0,230,118,0.4);color:var(--green);border-radius:6px;padding:8px 16px;font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;cursor:pointer;transition:all 0.15s}
  .bank-btn:hover{background:rgba(0,230,118,0.22)}
  @keyframes bkFlash{0%,100%{background:#ff2200}50%{background:#fff200}}
  .bankrupt-flash{animation:bkFlash 0.25s 8}
  /* WAITING OVERLAY */
  .waiting-overlay{position:fixed;inset:0;z-index:100;background:linear-gradient(180deg,#000c2a 0%,#001845 60%,#000c2a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  .waiting-overlay.hidden{display:none}
  .wt-icon{font-size:80px;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .wt-title{font-family:'Bebas Neue',cursive;font-size:54px;letter-spacing:8px;color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,0.35)}
  .wt-sub{font-size:14px;letter-spacing:5px;color:#1e3050;animation:blink 1.8s ease infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
  .wt-brand{font-size:13px;letter-spacing:4px;color:#1a2e46}


  /* VIDEO OVERLAY */
  .video-overlay{position:fixed;inset:0;z-index:200;background:#000;display:none;align-items:center;justify-content:center}
  .video-overlay.show{display:flex}
  .video-overlay video{width:100%;height:100%;object-fit:contain}

</style>
</head>
<body>
<!-- VIDEO INTRO (muted on wheel) -->
<div class="video-overlay" id="videoOverlay">
  <video id="introVideo" muted playsinline>
    <source src="../video/intro.mp4" type="video/mp4">
  </video>
</div>
<!-- WAITING -->
<div class="waiting-overlay" id="waiting">
  <div class="wt-icon">⚡</div>
  <div class="wt-title">WHEEL OF FORTUNE</div>
  <div class="wt-brand">Life.Church — EMP Training</div>
  <div class="wt-sub" id="waitSub">Waiting for host to start…</div>
</div>
<div class="header">
  <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
  <div class="eyebrow">⚡ Life.Church EMP Training ⚡</div>
  <h1>WHEEL OF FORTUNE</h1>
  <div class="screen-badge">SCREEN 2 — WHEEL</div>
</div>
<div class="wheel-area">
  <div class="spin-value-display" id="spinValueDisplay">WAITING FOR HOST…</div>
  <div class="wheel-wrapper">
    <div class="pointer"></div>
    <canvas id="wheelCanvas" width="600" height="600"></canvas>
  </div>
  <div class="spin-result-wrap">
    <div class="spin-result-label">Landed on</div>
    <div class="spin-result" id="spinResult">— —</div>
  </div>
</div>
<div class="scoreboard">
  <div class="team-block active" id="tb1">
    <div class="team-stripe s1"></div>
    <div class="team-data">
      <div class="team-name-row"><span class="team-name t1n">Team 1</span><span class="turn-pill">THEIR TURN</span></div>
      <div class="team-total" id="t1total">$0</div>
      <div class="team-round">Round: <span id="t1round">$0</span></div>
    </div>
    <button class="bank-btn" onclick="bankRound(1)">✓ Bank</button>
  </div>
  <div class="score-divider"></div>
  <div class="team-block" id="tb2">
    <div class="team-stripe s2"></div>
    <div class="team-data">
      <div class="team-name-row"><span class="team-name t2n">Team 2</span><span class="turn-pill">THEIR TURN</span></div>
      <div class="team-total" id="t2total">$0</div>
      <div class="team-round">Round: <span id="t2round">$0</span></div>
    </div>
    <button class="bank-btn" onclick="bankRound(2)">✓ Bank</button>
  </div>
</div>
<script>
// ============================================================
// ⚠️  PASTE YOUR ABLY ROOT API KEY BETWEEN THE QUOTES BELOW
// ============================================================
const ABLY_KEY = 'leOFKA.nbOkGA:CknTFn0f2ehAmi88tbNF0Hj5wY_ld-XuxHnOjbKkYTg';

const SEGS = [
  {label:'$500',      value:500,  color:'#c00000'},
  {label:'LOSE\nTURN', value:0,  color:'#1a1a1a', special:'lose', textColor:'#ff4444'},
  {label:'$900',      value:900,  color:'#e87c00'},
  {label:'$300',      value:300,  color:'#8b00c8'},
  {label:'BANKRUPT',  value:0,    color:'#0a0a0a', special:'bankrupt', textColor:'#ff2200'},
  {label:'$700',      value:700,  color:'#0055cc'},
  {label:'$400',      value:400,  color:'#c00000'},
  {label:'$1000',     value:1000, color:'#007a2f'},
  {label:'$250',      value:250,  color:'#e8b800'},
  {label:'$600',      value:600,  color:'#6600aa'},
  {label:'LOSE\nTURN', value:0,  color:'#1a1a1a', special:'lose', textColor:'#ff4444'},
  {label:'$800',      value:800,  color:'#006eb0'},
  {label:'$350',      value:350,  color:'#c07000'},
  {label:'FREE\nSPIN', value:500, color:'#008844', special:'free', textColor:'#ffffff'},
  {label:'$550',      value:550,  color:'#cc0066'},
  {label:'$1500',     value:1500, color:'#0044aa'},
];
const N = SEGS.length;
const SEG_ANG = (2*Math.PI)/N;

let wheelAngle = 0, spinning = false, currentTeam = 1;
let channel, cachedState = {};
let gameStarted = false;

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');

function drawWheel(rot) {
  const W=canvas.width,cx=W/2,cy=W/2,r=cx-10;
  ctx.clearRect(0,0,W,W);
  // Outer dark ring
  ctx.beginPath();ctx.arc(cx,cy,r+14,0,2*Math.PI);
  ctx.fillStyle='#111';ctx.fill();
  // Gold rim
  ctx.beginPath();ctx.arc(cx,cy,r+10,0,2*Math.PI);
  const rg=ctx.createRadialGradient(cx,cy,r+2,cx,cy,r+10);
  rg.addColorStop(0,'#FFD700');rg.addColorStop(0.5,'#e8a800');rg.addColorStop(1,'#7a5000');
  ctx.fillStyle=rg;ctx.fill();
  SEGS.forEach((seg,i) => {
    const a0=rot+i*SEG_ANG-Math.PI/2, a1=a0+SEG_ANG;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,a0,a1);ctx.closePath();
    ctx.fillStyle=seg.color;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(a0+SEG_ANG/2);
    ctx.textAlign='right';ctx.shadowColor='rgba(0,0,0,1)';ctx.shadowBlur=10;
    const lines=seg.label.split('\n');
    const fs=seg.label.replace('\n','').length>7?22:30;
    ctx.font=`bold ${fs}px 'Bebas Neue',cursive`;
    ctx.fillStyle=seg.textColor||'#ffffff';
    lines.forEach((ln,li) => { ctx.fillText(ln,r-10,(li-(lines.length-1)/2)*28+4); });
    ctx.restore();
  });
  // Hub shadow
  ctx.beginPath();ctx.arc(cx,cy,44,0,2*Math.PI);
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fill();
  // Hub outer ring
  ctx.beginPath();ctx.arc(cx,cy,42,0,2*Math.PI);
  ctx.fillStyle='#222';ctx.fill();
  // Hub gold ring
  ctx.beginPath();ctx.arc(cx,cy,38,0,2*Math.PI);
  ctx.fillStyle='#c8960c';ctx.fill();
  // Hub inner
  const hg=ctx.createRadialGradient(cx,cy,0,cx,cy,34);
  hg.addColorStop(0,'#fff8e0');hg.addColorStop(0.4,'#FFD700');hg.addColorStop(1,'#c87000');
  ctx.beginPath();ctx.arc(cx,cy,34,0,2*Math.PI);ctx.fillStyle=hg;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=2;ctx.stroke();
  ctx.font='bold 20px Bebas Neue,cursive';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowBlur=0;ctx.fillStyle='#000';
  ctx.fillText('WOF',cx,cy);
}
drawWheel(0);

function spinWheel() {
  if (spinning) return;
  spinning = true;
  const extra=(5+Math.random()*6)*2*Math.PI;
  const dur=3500+Math.random()*2000;
  const startAngle=wheelAngle, t0=performance.now();
  function frame(now) {
    const p=Math.min((now-t0)/dur,1), ease=1-Math.pow(1-p,3);
    drawWheel(startAngle+extra*ease);
    if (p<1) { requestAnimationFrame(frame); }
    else { wheelAngle=(startAngle+extra)%(2*Math.PI); spinning=false; land(wheelAngle); }
  }
  requestAnimationFrame(frame);
}

function land(angle) {
  const norm=((-angle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  const idx=Math.floor(norm/SEG_ANG)%N;
  const seg=SEGS[idx];
  const label=seg.label.replace('\n',' ');
  document.getElementById('spinResult').textContent=label;

  let update = {};

  if (seg.special==='bankrupt') {
    document.getElementById('spinResult').classList.add('bankrupt-flash');
    setTimeout(()=>document.getElementById('spinResult').classList.remove('bankrupt-flash'),2500);
    document.getElementById('spinValueDisplay').textContent='BANKRUPT!';
    update = {spinValue:0, canGuess:false, status:`💥 BANKRUPT! Team ${currentTeam} loses all round winnings!`,
      t1round: currentTeam===1 ? 0 : cachedState.t1round||0,
      t2round: currentTeam===2 ? 0 : cachedState.t2round||0};
    publishWheelUpdate(update);
    playWheelSFX('bankrupt');
    setTimeout(() => {
      currentTeam = currentTeam===1?2:1;
      publishWheelUpdate({team:currentTeam, status:`Team ${currentTeam}'s turn — spin the wheel!`});
      updateScoreboard();
    }, 1800);
  } else if (seg.special==='lose') {
    document.getElementById('spinValueDisplay').textContent='LOSE A TURN';
    update = {spinValue:0, canGuess:false, status:`😬 LOSE A TURN! Team ${currentTeam}'s turn is over.`};
    publishWheelUpdate(update);
    playWheelSFX('lose_turn');
    setTimeout(() => {
      currentTeam = currentTeam===1?2:1;
      publishWheelUpdate({team:currentTeam, status:`Team ${currentTeam}'s turn — spin the wheel!`});
      updateScoreboard();
    }, 1500);
  } else {
    document.getElementById('spinValueDisplay').textContent=`${label} per letter`;
    update = {spinValue:seg.value, canGuess:true, status:`🎡 Team ${currentTeam} spun ${label}! Guess a letter!`};
    publishWheelUpdate(update);
  }
}

function publishWheelUpdate(data) {
  if (channel) channel.publish('wheel-update', data);
}

function bankRound(t) {
  const total = (cachedState[`t${t}total`]||0) + (cachedState[`t${t}round`]||0);
  const update = {[`t${t}total`]:total, [`t${t}round`]:0};
  cachedState = {...cachedState, ...update};
  publishWheelUpdate(update);
  applyScores(cachedState);
}

function applyScores(data) {
  if (typeof data.team !== 'undefined') { currentTeam=data.team; updateScoreboard(); }
  document.getElementById('t1total').textContent='$'+(data.t1total||0).toLocaleString();
  document.getElementById('t2total').textContent='$'+(data.t2total||0).toLocaleString();
  document.getElementById('t1round').textContent='$'+(data.t1round||0).toLocaleString();
  document.getElementById('t2round').textContent='$'+(data.t2round||0).toLocaleString();
}

function updateScoreboard() {
  document.getElementById('tb1').classList.toggle('active',currentTeam===1);
  document.getElementById('tb2').classList.toggle('active',currentTeam===2);
}


// ============================================================
// AUDIO — Wheel plays: theme music, bankrupt, lose_turn
// ============================================================
let isMuted = false;
let themeAudio = null;
let musicVol = 0.6;
let sfxVol = 0.9;

const WHEEL_SFX = {
  bankrupt:  '../audio/bankrupt.mp3',
  lose_turn: '../audio/wrong.mp3',
};

function playWheelSFX(name) {
  if (isMuted) return;
  const src = WHEEL_SFX[name];
  if (!src) return;
  const a = new Audio(src); a.volume = sfxVol; a.play().catch(()=>{});
}

function startTheme(file) {
  if (isMuted) return;
  stopTheme();
  themeAudio = new Audio(file);
  themeAudio.loop = true;
  themeAudio.volume = musicVol;
  themeAudio.play().catch(()=>{});
}

function stopTheme() {
  if (themeAudio) { themeAudio.pause(); themeAudio.currentTime = 0; themeAudio = null; }
}

function handleAudioCue(d) {
  switch (d.cue) {
    case 'spin-start':    startTheme(d.trackFile); break;
    case 'music-stop':    stopTheme(); break;
    case 'mute':          isMuted = d.muted; if (isMuted) stopTheme(); break;
    case 'set-music-vol': musicVol = d.vol; if (themeAudio) themeAudio.volume = d.vol; break;
    case 'set-sfx-vol':   sfxVol = d.vol; break;
  }
}



// Pre-prime the video on page load so autoplay is unlocked when host triggers it
window.addEventListener('load', () => {
  const vid = document.getElementById('introVideo');
  if (!vid) return;
  vid.muted = true;
  vid.load();
  // Attempt silent play+pause to register with browser autoplay policy
  const p = vid.play();
  if (p) p.then(() => { vid.pause(); vid.currentTime = 0; }).catch(() => {});
});

function revealGame() {
  const ov  = document.getElementById('videoOverlay');
  const vid = document.getElementById('introVideo');

  function afterVideo() {
    gameStarted = true;
    ov.classList.remove('show');
    document.getElementById('waiting').classList.add('hidden');
    if (cachedState && cachedState.phrase) applyScores(cachedState);
  }

  document.getElementById('waiting').classList.add('hidden');
  ov.classList.add('show');
  vid.currentTime = 0;
  vid.muted = true; // wheel is always muted
  vid.play().then(() => {
    vid.onended = afterVideo;
  }).catch(() => {
    // Autoplay still blocked — skip video, go straight to game
    afterVideo();
  });
}

function initAbly() {
  const ably = new Ably.Realtime({key:ABLY_KEY});
  channel = ably.channels.get('emp-wof');

  channel.subscribe('state', (msg) => {
    cachedState = msg.data;
    if (gameStarted) {
      document.getElementById('waiting').classList.add('hidden');
      applyScores(msg.data);
      if (msg.data.spinValue !== undefined) {
        document.getElementById('spinValueDisplay').textContent =
          msg.data.canGuess ? `$${msg.data.spinValue} per letter` : 'WAITING FOR HOST…';
      }
    }
  });

  channel.subscribe('spin-trigger', (msg) => {
    if (msg.data.spin) spinWheel();
  });

  // Audio cues from host
  channel.subscribe('audio-cue', (msg) => { handleAudioCue(msg.data); });

  // Intro video trigger from host
  channel.subscribe('intro-start', () => { revealGame(); });
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen().catch(()=>{});
}
document.addEventListener('fullscreenchange', () => {
  const btn=document.querySelector('.fullscreen-btn');
  if (btn) btn.textContent=document.fullscreenElement?'✕ Exit Fullscreen':'⛶ Fullscreen';
});

initAbly();
</script>
</body>
</html>
